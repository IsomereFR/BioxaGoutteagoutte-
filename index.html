<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GOUTTE À GOUTTE — Bioxa</title>
<style>
  :root{ --navy:#0a1730; --blue:#1F4E9B; --green:#86B63A; --cream:#f4f1e8; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    height:100%;height:100dvh;background:#06101f;overflow:hidden;position:fixed;inset:0;
    font-family:"Courier New",monospace;color:var(--cream);
    display:flex;align-items:center;justify-content:center;
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #wrap{position:relative;aspect-ratio:300/520;width:min(100vw, calc(100dvh * 300 / 520));display:flex}
  canvas{height:100%;width:100%;display:block;image-rendering:pixelated;image-rendering:crisp-edges;
    background:var(--navy);border:3px solid #15294d;border-radius:6px}
  #scan{position:absolute;inset:0;pointer-events:none;border-radius:6px;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0,rgba(0,0,0,.18) 1px,transparent 2px,transparent 3px);
    mix-blend-mode:multiply;opacity:.5}
  #entry{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:3vh;border-radius:6px;background:rgba(6,16,31,.88);padding:6%}
  #entry h2{font-size:clamp(13px,4.2vh,22px);letter-spacing:2px;color:var(--green);text-transform:uppercase;text-align:center}
  #entry p{font-size:clamp(10px,2.4vh,14px);opacity:.85;text-align:center}
  #nameIn{width:70%;text-align:center;text-transform:uppercase;letter-spacing:4px;font-family:inherit;font-weight:bold;
    font-size:clamp(15px,4vh,26px);padding:10px;background:#0a1730;color:var(--cream);border:2px solid var(--blue);border-radius:4px;outline:none}
  #okBtn{font-family:inherit;font-weight:bold;letter-spacing:2px;cursor:pointer;font-size:clamp(12px,3vh,17px);
    padding:11px 26px;text-transform:uppercase;background:var(--green);color:#0a1730;border:none;border-radius:4px}
  #okBtn:active{transform:translateY(1px)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="300" height="520"></canvas>
  <div id="scan"></div>
  <div id="entry">
    <h2>Nouveau score !</h2>
    <p>Tes initiales (3 à 8 lettres)</p>
    <input id="nameIn" maxlength="8" value="BIO" autocomplete="off" spellcheck="false">
    <button id="okBtn">Valider</button>
  </div>
</div>

function drawLogo(cx,topY,h){ if(!logoReady){text('BIOXA',cx,topY+h/2,h*0.4,C.blueL);return;}
  const w=h*(logo.width/logo.height); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(logo,Math.round(cx-w/2),Math.round(topY),Math.round(w),Math.round(h)); }
function r(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(x|0,y|0,w|0,h|0); }
function text(s,x,y,sz,col,al='center'){ ctx.fillStyle=col;ctx.textAlign=al;ctx.textBaseline='middle';
  ctx.font='bold '+sz+'px "Courier New",monospace'; ctx.fillText(s,x,y); }

// ---- sprites ----
const DROP=['..dd..','.drrd.','drrrrd','drhrrd','drrrrd','.drrd.','..dd..'];
const DMAP={d:C.redD,r:C.red,h:C.redH}; const DW=6,DH=DROP.length;
function drawDrop(px,py,s){ for(let j=0;j<DH;j++){const row=DROP[j];
  for(let i=0;i<DW;i++){const ch=row[i];if(ch==='.')continue;r(px+i*s,py+j*s,s,s,DMAP[ch]);}}}

const VIR=['...KK...','.K.BB.K.','..BBBB..','KBBPPBBK','KBBBBBBK','..BBBB..','.K.BB.K.','...KK...'];
const VMAP={K:C.viroD,B:C.viro,P:C.viroP}; const VW=8;
function drawVirus(px,py,s){ for(let j=0;j<VIR.length;j++){const row=VIR[j];
  for(let i=0;i<VW;i++){const ch=row[i];if(ch==='.')continue;r(px+i*s,py+j*s,s,s,VMAP[ch]);}}}

function drawBonus(cx,cy,sub){
  const col=sub==='life'?C.green:sub==='wide'?C.blueL:C.gold;
  ctx.globalAlpha=.30; r(cx-10,cy-10,20,20,col); ctx.globalAlpha=1;
  r(cx-8,cy-8,16,16,col); r(cx-8,cy-8,16,2,'#ffffff'); r(cx-8,cy-8,2,16,'#ffffff');
  if(sub==='life'){ r(cx-1,cy-5,2,10,'#fff'); r(cx-5,cy-1,10,2,'#fff'); }
  else if(sub==='wide'){ r(cx-5,cy-1,10,2,'#fff'); r(cx-6,cy-3,2,6,'#fff'); r(cx+4,cy-3,2,6,'#fff'); }
  else { for(let k=-3;k<=3;k++){ r(cx+k-1,cy+k-1,2,2,'#fff'); r(cx+k-1,cy-k-1,2,2,'#fff'); } }
}
function miniStar(cx,cy){ r(cx-1,cy-3,2,6,C.gold); r(cx-3,cy-1,6,2,C.gold); r(cx-1,cy-1,2,2,'#fff'); }
function miniArrows(cx,cy){ r(cx-4,cy-1,8,2,C.blueL); r(cx-5,cy-2,1,4,C.blueL); r(cx+4,cy-2,1,4,C.blueL); }

// ===================== ÉTAT =====================
let state='TITLE', items=[], parts=[], floats=[];
let score=0, lives=3, level=1, tubeX=W/2, tubeMouthY=H-94;
let spawnT=0, shake=0, flash=0, wideTimer=0, x2Timer=0;
let board=[], lastScore=0, lastName='';

function resetGame(){ items=[];parts=[];floats=[];score=0;lives=3;level=1;tubeX=W/2;
  spawnT=0;shake=0;flash=0;wideTimer=0;x2Timer=0;state='PLAY'; }

function spawnItem(){
  const r1=Math.random(); const virusChance=Math.min(0.30,0.12+(level-1)*0.02);
  let type='blood'; if(r1<virusChance)type='virus'; else if(r1<virusChance+0.09)type='bonus';
  const baseV=60+(level-1)*13; const e={type,y:-30,resolved:false,missed:false};
  if(type==='blood'){ e.w=18;e.h=21;e.vy=baseV*(0.9+Math.random()*0.35); }
  else if(type==='virus'){ e.w=24;e.h=24;e.vy=baseV*(0.85+Math.random()*0.30); }
  else { e.w=18;e.h=18;e.vy=baseV*0.78; e.sub=['wide','x2','wide','x2','life'][(Math.random()*5)|0]; }
  e.x=10+Math.random()*(W-20-e.w); items.push(e);
}
function burst(x,y,col){ for(let i=0;i<8;i++) parts.push({x,y,vx:(Math.random()-0.5)*120,vy:-Math.random()*120-20,life:0.5,col}); }
function applyBonus(sub,x,y){
  if(sub==='life'){ lives=Math.min(5,lives+1); floats.push({x,y:y-6,txt:'+1 VIE',life:.9,col:C.greenL}); }
  else if(sub==='wide'){ wideTimer=6; floats.push({x,y:y-6,txt:'TUBE +',life:.9,col:C.blueL}); }
  else { x2Timer=6; floats.push({x,y:y-6,txt:'x2 !',life:.9,col:C.gold}); }
}

// ---- entrées ----
function pointerX(e){ const rect=cv.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  return Math.max(0,Math.min(W, cx/rect.width*W)); }
function onMove(e){ if(state==='PLAY'){ tubeX=pointerX(e); e.preventDefault(); } }
cv.addEventListener('pointermove',onMove,{passive:false});
cv.addEventListener('touchmove',onMove,{passive:false});
function tap(){ if(state==='TITLE')resetGame(); else if(state==='BOARD')state='TITLE'; }
cv.addEventListener('pointerdown',(e)=>{ if(state==='PLAY')tubeX=pointerX(e); tap(); });
const keys={}; addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '||e.key==='Enter')tap();});
addEventListener('keyup',e=>{keys[e.key]=false;});

// ---- boucle ----
let last=performance.now();
function loop(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; update(dt); render(); requestAnimationFrame(loop); }

function update(dt){
  if(shake>0)shake-=dt*40; if(flash>0)flash-=dt*2.5;
  parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=320*dt;p.life-=dt;}); parts=parts.filter(p=>p.life>0);
  floats.forEach(f=>{f.y-=24*dt;f.life-=dt;}); floats=floats.filter(f=>f.life>0);
  if(state!=='PLAY') return;

  if(wideTimer>0)wideTimer-=dt; if(x2Timer>0)x2Timer-=dt;
  const half=wideTimer>0?23:15;
  if(keys['ArrowLeft'])  tubeX-=180*dt;
  if(keys['ArrowRight']) tubeX+=180*dt;
  tubeX=Math.max(half,Math.min(W-half,tubeX));

  level=1+Math.floor(score/8);
  const spawnEvery=Math.max(0.45,1.2-(level-1)*0.06);
  spawnT-=dt; if(spawnT<=0){ spawnItem(); spawnT=spawnEvery; }

  const mouthY=tubeMouthY, tw=wideTimer>0?46:30, halfBox=tw/2+2;
  for(const e of items){
    e.y+=e.vy*dt; const cx=e.x+e.w/2;
    // ATTRAPÉ dès que le tube TOUCHE la goutte (chevauchement des rectangles)
    const touch = !e.resolved &&
      e.x < tubeX+halfBox && e.x+e.w > tubeX-halfBox &&
      e.y < mouthY+22 && e.y+e.h > mouthY-3;
    if(touch){
      e.resolved=true; e.dead=true;
      if(e.type==='blood'){ const p=x2Timer>0?2:1; score+=p;
        floats.push({x:cx,y:mouthY-8,txt:'+'+p,life:.7,col:C.greenL}); burst(cx,mouthY,C.redH); }
      else if(e.type==='virus'){ lives--; shake=11; flash=.85;
        floats.push({x:cx,y:mouthY-8,txt:'-1',life:.8,col:C.redH}); burst(cx,mouthY,C.viro); }
      else { applyBonus(e.sub,cx,mouthY); burst(cx,mouthY,e.sub==='life'?C.greenL:e.sub==='wide'?C.blueL:C.gold); }
    }
    if(e.y>H){ if(e.type==='blood'&&!e.resolved){ lives--; shake=8; flash=.7; } e.dead=true; }
  }
  items=items.filter(e=>!e.dead);
  if(lives<=0){ lastScore=score; state='OVER'; showEntry(); }
}

// ===================== RENDU =====================
function render(){
  ctx.save(); if(shake>0)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);
  r(0,0,W,H,C.bg); ctx.fillStyle=C.grid; for(let y=30;y<H;y+=22)ctx.fillRect(0,y,W,1);
  r(0,0,W,26,C.band); for(let x=0;x<W;x+=10)r(x,26,6,3,C.shadow);
  if(state==='TITLE')renderTitle(); else if(state==='BOARD')renderBoard(); else renderPlay();
  parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life*2);r(p.x,p.y,2,2,p.col);}); ctx.globalAlpha=1;
  floats.forEach(f=>{ctx.globalAlpha=Math.max(0,f.life);text(f.txt,f.x,f.y,11,f.col||C.greenL);}); ctx.globalAlpha=1;
  if(flash>0){ctx.fillStyle='rgba(193,18,31,'+(flash*0.35)+')';ctx.fillRect(0,0,W,H);}
  ctx.restore();
}
function renderHUD(){
  text('SCORE '+score,8,40,13,C.cream,'left');
  const slots=Math.max(3,lives);
  for(let i=0;i<slots;i++){ ctx.globalAlpha=i<lives?1:0.22; drawDrop(W-16-i*14,33,2);} ctx.globalAlpha=1;
  text('NIVEAU '+level,W/2,40,11,C.greenL);
}
function renderPlay(){
  for(const e of items){
    if(e.type==='blood')drawDrop(e.x,e.y,3);
    else if(e.type==='virus')drawVirus(e.x,e.y,3);
    else drawBonus(e.x+e.w/2,e.y+e.h/2,e.sub);
  }
  const tw=wideTimer>0?46:30; drawTube(tubeX,tubeMouthY,tw);
  // accessoires actifs au-dessus du tube
  let ax=tubeX-((x2Timer>0&&wideTimer>0)?7:0);
  if(x2Timer>0){ miniStar(ax,tubeMouthY-12); ax+=14; }
  if(wideTimer>0){ miniArrows(ax,tubeMouthY-12); }
  renderHUD();
  drawLogo(W/2,H-50,38);
}
function drawTube(cx,topY,w){
  const h=44,x=cx-w/2;
  r(x+3,topY+h-4,w-6,4,C.shadow);
  r(x,topY,3,h-6,C.glass); r(x+w-3,topY,3,h-6,C.glass);
  r(x+3,topY+h-6,w-6,3,C.glass); r(x+6,topY+h-3,w-12,3,C.glass);
  r(x+3,topY+18,w-6,h-24,C.red); r(x+3,topY+18,w-6,3,C.redH); r(x+3,topY+h-9,w-6,3,C.redD);
  r(x-1,topY-2,w+2,4,C.blueL); r(x-1,topY,w+2,2,C.blue);
  r(x+5,topY+22,2,h-30,C.cream);
}
function renderTitle(){
  drawLogo(W/2,12,128);
  text('GOUTTE À GOUTTE',W/2,176,18,C.cream);
  // légende
  const lx=86;
  drawDrop(lx,206,3);          text('À ATTRAPER',lx+30,216,11,C.cream,'left');
  drawVirus(lx-3,236,3);       text('À ÉVITER  -1 vie',lx+30,248,11,C.redH,'left');
  drawBonus(lx+9,286,'x2');    text('BONUS',lx+30,286,11,C.gold,'left');
  text('Doigt · souris · flèches ←  →',W/2,330,10,C.blueL);
  if(Math.floor(performance.now()/500)%2===0) text('▶  TAPE POUR JOUER',W/2,378,15,C.greenL);
  text('Termine une partie pour entrer',W/2,430,9,C.cream);
  text('au classement',W/2,446,9,C.cream);
}
function renderBoard(){
  drawLogo(W/2,8,30); text('MEILLEURS SCORES',W/2,62,16,C.green);
  const rows=board.length?board:[{name:'---',score:0}];
  rows.slice(0,8).forEach((e,i)=>{ const y=108+i*40, hot=(e.name===lastName&&e.score===lastScore);
    text((i+1)+'.',30,y,14,hot?C.greenL:C.cream,'left');
    text(e.name,64,y,14,hot?C.greenL:C.cream,'left');
    text(String(e.score),W-30,y,14,hot?C.greenL:C.blueL,'right'); });
  if(Math.floor(performance.now()/500)%2===0) text('TAPE POUR REJOUER',W/2,H-40,12,C.cream);
}

// ============== SAISIE + LEADERBOARD ==============
const entry=document.getElementById('entry'),nameIn=document.getElementById('nameIn'),okBtn=document.getElementById('okBtn');
function showEntry(){ document.querySelector('#entry h2').textContent='Score : '+lastScore+' 🩸'; entry.style.display='flex'; nameIn.focus(); nameIn.select(); }
async function submitScore(){ lastName=(nameIn.value||'BIO').toUpperCase().slice(0,8); entry.style.display='none'; board=await lbSave(lastName,lastScore); state='BOARD'; }
okBtn.addEventListener('click',submitScore);
nameIn.addEventListener('keydown',e=>{ if(e.key==='Enter')submitScore(); });

/* LEADERBOARD partagé en ligne (via l'API Vercel + Upstash Redis).
   Le classement est commun à TOUS les joueurs. */
async function lbLoad(){
  try{ const r=await fetch('/api/leaderboard'); return await r.json(); }
  catch(e){ return []; }
}
async function lbSave(name,score){
  try{
    const r=await fetch('/api/leaderboard',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,score})});
    return await r.json();
  }catch(e){ return []; }
}

lbLoad().then(list=>{ if(Array.isArray(list)) board=list; });
requestAnimationFrame(loop);
</script>
